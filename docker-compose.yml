version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    container_name: skyforge-backend

    ports:
      - "5001:5001"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile

    container_name: skyforge-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend