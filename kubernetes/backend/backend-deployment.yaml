apiVersion: apps/v1
kind: Deployment

metadata:
  name: skyforge-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: skyforge-backend:v3

        imagePullPolicy: Never

        ports:
        - containerPort: 5001